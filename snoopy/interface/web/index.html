<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snoopy — Assistente de IA</title>
<style>
  :root {
    --bg: #0d1b2a;
    --bg2: #1b263b;
    --surface: #1e2a3d;
    --accent: #4cc9f0;
    --accent2: #90e0ef;
    --texto: #e0e6ed;
    --texto-fraco: #8b9bb0;
    --user: #2a3f5f;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, var(--bg), var(--bg2));
    color: var(--texto);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header .status { font-size: 13px; color: var(--texto-fraco); }
  .status-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #2ecc71; margin-right: 5px;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.5;
    animation: surgir 0.3s ease;
  }
  @keyframes surgir { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
  .msg.user {
    align-self: flex-end;
    background: var(--user);
    border-bottom-right-radius: 4px;
  }
  .msg.snoopy {
    align-self: flex-start;
    background: var(--surface);
    border-bottom-left-radius: 4px;
    border-left: 3px solid var(--accent);
  }
  .msg .quem { font-size: 12px; color: var(--texto-fraco); margin-bottom: 4px; }
  .digitando { display: flex; gap: 4px; padding: 4px 0; }
  .digitando span {
    width: 8px; height: 8px; background: var(--accent);
    border-radius: 50%; animation: pulsar 1.2s infinite;
  }
  .digitando span:nth-child(2) { animation-delay: 0.2s; }
  .digitando span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulsar { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }
  footer {
    padding: 16px 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  #entrada {
    flex: 1;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 14px 18px;
    color: var(--texto);
    font-size: 15px;
    outline: none;
  }
  #entrada:focus { border-color: var(--accent); }
  button {
    border: none;
    cursor: pointer;
    border-radius: 50%;
    width: 52px; height: 52px;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.2s;
  }
  button:active { transform: scale(0.92); }
  #btn-enviar { background: var(--accent); color: var(--bg); }
  #btn-falar { background: var(--accent2); color: var(--bg); }
  #btn-falar.gravando { background: #e63946; color: white; animation: gravando 1s infinite; }
  @keyframes gravando { 0%,100% { box-shadow: 0 0 0 0 rgba(230,57,70,0.6); } 50% { box-shadow: 0 0 0 12px rgba(230,57,70,0); } }
  .vazio { text-align: center; color: var(--texto-fraco); margin: auto; }
  .vazio .grande { font-size: 56px; margin-bottom: 12px; }
</style>
</head>
<body>
  <header>
    <div class="logo">🐾</div>
    <div>
      <h1>Snoopy</h1>
      <div class="status"><span class="status-dot"></span>Online · 100% local</div>
    </div>
  </header>

  <div id="chat">
    <div class="vazio" id="vazio">
      <div class="grande">🐾</div>
      <p>Olá! Sou o Snoopy.<br>Fale ou escreva para começar.</p>
    </div>
  </div>

  <footer>
    <input id="entrada" type="text" placeholder="Digite uma mensagem..." autocomplete="off">
    <button id="btn-falar" title="Falar">🎤</button>
    <button id="btn-enviar" title="Enviar">➤</button>
  </footer>

<script>
  const chat = document.getElementById('chat');
  const entrada = document.getElementById('entrada');
  const btnEnviar = document.getElementById('btn-enviar');
  const btnFalar = document.getElementById('btn-falar');
  const vazio = document.getElementById('vazio');

  let ws;
  let gravando = false;
  let mediaRecorder;
  let chunks = [];

  function conectar() {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onmessage = (e) => {
      const dados = JSON.parse(e.data);
      tratarMensagem(dados);
    };
    ws.onclose = () => setTimeout(conectar, 2000);
  }
  conectar();

  function tratarMensagem(dados) {
    if (dados.tipo === 'status') {
      if (dados.conteudo === 'pensando') mostrarDigitando();
    } else if (dados.tipo === 'transcricao') {
      adicionarMsg('user', dados.conteudo);
    } else if (dados.tipo === 'resposta') {
      removerDigitando();
      adicionarMsg('snoopy', dados.conteudo);
      falar(dados.conteudo);
    } else if (dados.tipo === 'erro') {
      removerDigitando();
      adicionarMsg('snoopy', dados.conteudo);
    }
  }

  function adicionarMsg(quem, texto) {
    if (vazio) vazio.style.display = 'none';
    const div = document.createElement('div');
    div.className = `msg ${quem}`;
    div.innerHTML = `<div class="quem">${quem === 'user' ? 'Você' : 'Snoopy'}</div>${texto}`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function mostrarDigitando() {
    removerDigitando();
    const div = document.createElement('div');
    div.className = 'msg snoopy';
    div.id = 'digitando-msg';
    div.innerHTML = `<div class="digitando"><span></span><span></span><span></span></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
  function removerDigitando() {
    const d = document.getElementById('digitando-msg');
    if (d) d.remove();
  }

  function enviarTexto() {
    const texto = entrada.value.trim();
    if (!texto) return;
    adicionarMsg('user', texto);
    ws.send(JSON.stringify({ tipo: 'texto', conteudo: texto }));
    entrada.value = '';
  }

  btnEnviar.onclick = enviarTexto;
  entrada.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarTexto(); });

  // Síntese de voz no navegador (fala a resposta do Snoopy)
  function falar(texto) {
    if (!('speechSynthesis' in window)) return;
    const fala = new SpeechSynthesisUtterance(texto);
    fala.lang = 'pt-BR';
    fala.rate = 1.05;
    const vozes = speechSynthesis.getVoices();
    const vozPt = vozes.find(v => v.lang.startsWith('pt'));
    if (vozPt) fala.voice = vozPt;
    speechSynthesis.speak(fala);
  }

  // Push-to-talk: grava áudio e envia
  btnFalar.onclick = async () => {
    if (!gravando) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const blob = new Blob(chunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = () => {
            const b64 = reader.result.split(',')[1];
            ws.send(JSON.stringify({ tipo: 'audio', conteudo: b64 }));
          };
          reader.readAsDataURL(blob);
          stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        gravando = true;
        btnFalar.classList.add('gravando');
      } catch (err) {
        alert('Não foi possível acessar o microfone: ' + err.message);
      }
    } else {
      mediaRecorder.stop();
      gravando = false;
      btnFalar.classList.remove('gravando');
    }
  };
</script>
</body>
</html>
